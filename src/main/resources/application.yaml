server:
  port: 8080

spring:
  application:
    name: tas-condopilot-api
  datasource:
    url: jdbc:mysql://localhost:3306/condopilot?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
    username: root
    password: root1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: America/Sao_Paulo

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: 12345678901234567890123456789012
    expiration: 86400000